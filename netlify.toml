[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[context.production.environment]
  LONGCAT_API_KEY = ""
  JWT_SECRET = ""
  NETLIFY_BLOB_TOKEN = ""

[context.deploy-preview.environment]
  LONGCAT_API_KEY = ""
  JWT_SECRET = ""
  NETLIFY_BLOB_TOKEN = ""
